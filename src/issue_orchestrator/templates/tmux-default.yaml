# Default tmuxp configuration for issue-orchestrator
#
# This config is loaded when creating the orchestrator's tmux session.
# To customize:
#   1. Copy this file to .issue-orchestrator/tmux.yaml in your repo
#   2. Edit as desired (windows, panes, layout)
#   3. Add to your orchestrator config: tmuxp: ".issue-orchestrator/tmux.yaml"
#
# Note: Key bindings (like double-click to zoom) are configured separately
# via tmux_bindings in your orchestrator config, not in this file.
#
# See https://tmuxp.git-pull.com/configuration/ for tmuxp configuration docs

session_name: orchestrator

# Session options
options:
  mouse: on

windows:
  # Dashboard window - shows orchestrator status
  - window_name: dashboard
    panes:
      - shell_command:
          - echo "Issue Orchestrator Dashboard"
          - echo "----------------------------"
          - echo ""
          - echo "Agent panes will appear in the 'agents' window."
          - echo "Click a pane to select it, double-click to zoom."

  # Agents window - all agent sessions appear as panes here
  - window_name: agents
    layout: tiled
    panes:
      # Initial empty pane - will be replaced by first agent
      - shell_command:
          - echo "Waiting for agent sessions..."
