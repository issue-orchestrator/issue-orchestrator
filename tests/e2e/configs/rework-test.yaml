# E2E Test Config: Rework Cycle Testing
#
# Uses script-based agents for fast, deterministic testing.
# Tests the rework cycle and escalation flow.

repo: BruceBGordon/issue-orchestrator

filter_label: test-data
control_api_port: 19082
e2e_pr_labels: ["test-data"]

# Don't install pre-push hooks for script agents (they don't have pyright in PATH)
enforce_hooks: false

agents:
  # Script that completes immediately (creates file, commits, calls agent-done)
  "agent:script-completes":
    command: "exec bash {prompt}"
    prompt: "tests/e2e/fixtures/scripts/complete-immediately.sh"
    meta_agent: "claude-code"
    timeout_minutes: 1
    worktree_base: "/tmp/e2e-worktrees"
    repo_root: "../../../"

  # Script that always requests changes (for testing rework cycles)
  "agent:script-rejects":
    command: "exec bash {prompt}"
    prompt: "tests/e2e/fixtures/scripts/always-reject.sh"
    meta_agent: "claude-code"
    timeout_minutes: 1
    worktree_base: "/tmp/e2e-worktrees"
    repo_root: "../../../"

concurrency:
  max_concurrent_sessions: 1
  session_timeout_minutes: 5

review:
  code_review_agent: "agent:script-rejects"
  code_review_label: "needs-code-review"
  code_reviewed_label: "code-reviewed"
  max_rework_cycles: 2
