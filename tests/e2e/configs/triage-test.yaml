# E2E Test Config: Triage Review Trigger
#
# Runs code reviews and batch triage reviews in isolation from shared suite.
#
# Note: tmux session is set via ORCHESTRATOR_TMUX_SESSION env var for test isolation.
# Control API port is dynamically assigned if not specified.

repo: BruceBGordon/issue-orchestrator
worktree_base: "/tmp/e2e-worktrees"

filtering:
  label: test-data

queue_refresh_seconds: 600
gh_audit_enabled: true
gh_audit_events: true
gh_audit_file: /tmp/e2e-orchestrator-logs/gh-audit-{pid}.json
# control_api_port: dynamically assigned
e2e_pr_labels: ["test-data"]

agents:
  "agent:e2e-test":
    prompt: "tests/e2e/fixtures/scripts/complete-immediately.sh"
    model: sonnet
    timeout_minutes: 3
    command: "bash {prompt}"
    meta_agent: "claude-code"
    permission_mode: bypassPermissions
  "agent:script-review":
    prompt: "tests/e2e/fixtures/scripts/review-decider.sh"
    model: sonnet
    timeout_minutes: 3
    command: "PR_NUMBER={pr_number} bash {prompt}"
    meta_agent: "claude-code"
    permission_mode: bypassPermissions
  "agent:triage-investigator":
    prompt: "tests/e2e/fixtures/scripts/complete-immediately.sh"
    model: sonnet
    timeout_minutes: 3
    command: "bash {prompt}"
    meta_agent: "claude-code"
    permission_mode: bypassPermissions

concurrency:
  max_concurrent_sessions: 4
  session_timeout_minutes: 3

review:
  code_review_agent: "agent:script-review"
  code_review_label: "needs-code-review"
  code_reviewed_label: "code-reviewed"
  triage_review_agent: "agent:triage-investigator"
  triage_review_label: "needs-triage-review"
  triage_reviewed_label: "triage-reviewed"
  triage_review_threshold: 2
  triage_review_on_failure: false
  max_rework_cycles: 2
