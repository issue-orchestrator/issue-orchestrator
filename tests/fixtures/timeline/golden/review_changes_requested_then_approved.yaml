scenario: review_changes_requested_then_approved
description: |
  Reviewer-requested-changes flow: agent codes, PR is reviewed, reviewer
  flags issues, rework agent fixes them, second review approves, merge.

  This pins the user-facing narrative for the most common non-trivial
  outcome: "the reviewer wants changes." The fixture covers:

    - **`review.changes_requested.detail`** — the `review_issues`
      payload that the user must read to understand what to fix,
      plus risk level.
    - **Multi-round review structure** — round 1 ends with
      changes_requested, round 2 with approved. Goldens pin both
      rounds appearing distinctly in the user view.
    - **Rework events** — `review.rework_started` /
      `review.rework_completed` showing the rework cycle inline.
    - **Narrative enrichment** — `_enrich_changes_requested`
      includes the round number; `_enrich_review_approved` adds
      "after N rounds" when rounds > 1.

  Discovered behavior pinned (worth a follow-up):

    - `review_exchange.failed` (not used in this fixture) currently
      maps to `status='completed'` despite the name (see PR #6151
      `events/spec.py` for the rest). This fixture's
      `review_exchange.round_completed` handling is consistent with
      production.

issue_number: 7777

