scenario: persistent_max_rounds_exceeded
description: |
  Reviewer never says `ok`. After `max_rounds=2` rounds — each
  ending with `needs_work` and a coder rework — the persistent
  runner exits the round loop and emits a terminal
  `REVIEW_EXCHANGE_COMPLETED` carrying `status="stopped"` and
  `reason="max_rounds_exceeded"`.

  This is one of three terminal exchange statuses the runner can
  emit:

    - `status="ok"`     — reviewer approved (covered by
                          `persistent_rework_then_approved.yaml`)
    - `status="error"`  — role timeout / protocol error
                          (covered by `persistent_role_timeout.yaml`)
    - `status="stopped"` — max_rounds_exceeded or no_progress
                          (this fixture)

  Source: `persistent_session_exchange.py:565` (post-loop emit).

  Pinned in this fixture:

    - All `max_rounds` rounds run to completion with `needs_work`
      verdicts; each emits a `REVIEW_EXCHANGE_ROUND_COMPLETED` with
      `coder_response_type="ok"` (the coder accepted the rework
      task).
    - The terminal `REVIEW_EXCHANGE_COMPLETED` carries the
      `max_rounds_exceeded` reason — distinct from the `reviewer_ok`
      reason of the success path.
    - `REVIEW_APPROVED` does NOT follow; the orchestrator's
      downstream logic (changes_requested / escalation) is left for
      a separate fixture.

issue_number: 8888

