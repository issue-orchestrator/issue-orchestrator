scenario: persistent_coder_protocol_error
description: |
  Coder violates the response-protocol contract — writes the review-
  response file but skips writing a completion-record file via
  `coding-done`. `_enforce_coder_protocol` re-prompts up to
  `_CODER_PROTOCOL_RETRY_LIMIT = 2` times with a remediation prompt;
  if all retries fail validation, `_build_outcome_for_protocol_error`
  emits a terminal `REVIEW_EXCHANGE_ROUND_COMPLETED` (with
  `coder_response_type="protocol_error"` and `detail=<error>`) plus a
  `REVIEW_EXCHANGE_COMPLETED` (with `status="error"`,
  `reason="coder_protocol_error"`, `detail=<error>`).

  Source citations:
    - retry loop emits:                      persistent_session_exchange.py:621-680
    - `protocol_retry: True` flag on retry:  persistent_session_exchange.py:640
    - terminal ROUND_COMPLETED + COMPLETED:  persistent_session_exchange.py:942, 952

  Pinned in this fixture:

    - The `protocol_retry: True` flag carried on retry-prompt events
      (retries 1 and 2). Distinguishes them from the original coder
      prompt and any normal next-round prompt.
    - Two retries fire before exit, matching `_CODER_PROTOCOL_RETRY_LIMIT`.
    - Terminal `REVIEW_EXCHANGE_ROUND_COMPLETED` carries
      `coder_response_type: "protocol_error"` (a sentinel reserved
      for this path) and a `detail` field describing what validation
      found.
    - Terminal `REVIEW_EXCHANGE_COMPLETED` carries `status: "error"`,
      `reason: "coder_protocol_error"`. Per the prior PR in this
      stack, the user-facing narrative renders as
      `"Review exchange failed (1 round)"`.

issue_number: 6666

