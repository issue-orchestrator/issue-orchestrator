internal_timeline:
  - { event: session.started, phase: in_progress, step: started, status: started, parent_key: "session:issue-5678-1" }
  - { event: observation.completion_detected, phase: in_progress, step: completion_detected, status: completed }
  - event: session.completed
    phase: in_progress
    step: completed
    status: completed
    detail: "Added the feature"
  - { event: validation.started, phase: orchestrator, step: validation.started, status: started }
  - { event: validation.completed, phase: orchestrator, step: validation.completed, status: completed }
  - event: session.validation_failed
    phase: orchestrator
    step: validation_failed
    status: failed
    detail: "2 unit tests failed: test_foo, test_bar"
    artifacts:
      - { type: validation, label: Validation, value: "/runs/issue-5678/run-001/validation-record.json" }
      - { type: run_dir, label: Run Dir, value: "/runs/issue-5678/run-001" }
  - event: session.validation_retry_needed
    phase: orchestrator
    step: validation_retry_needed
    status: failed
    detail: "2 unit tests failed: test_foo, test_bar. Source: make test-unit"
  - { event: session.started, phase: in_progress, step: started, status: started, parent_key: "session:issue-5678-2" }
  - { event: observation.completion_detected, phase: in_progress, step: completion_detected, status: completed }
  - event: session.completed
    phase: in_progress
    step: completed
    status: completed
    detail: "Fixed the failing tests"
  - { event: validation.started, phase: orchestrator, step: validation.started, status: started }
  - { event: validation.completed, phase: orchestrator, step: validation.completed, status: completed }
  - event: session.validation_passed
    phase: orchestrator
    step: validation_passed
    status: completed
    artifacts:
      - { type: validation, label: Validation, value: "/runs/issue-5678/run-002/validation-record.json" }
  - event: issue.pr_created
    phase: orchestrator
    step: pr_created
    status: completed
    parent_key: "review:99"
    artifacts:
      - { type: pull_request, label: PR, value: "https://github.com/example/repo/pull/99" }
  - { event: issue.completed, phase: completed, step: completed, status: completed, parent_key: "issue:5678" }

external_view: user
external_timeline:
  - { event: agent.coding_started, status: started, narrative: "Coding agent started" }
  - { event: agent.coding_completed, status: completed, narrative: "Agent finished coding" }
  - event: agent.completed
    status: completed
    narrative: "Issue completed"
    detail: "Added the feature"
  - event: validation.failed
    status: failed
    narrative: "Validation failed"
    detail: "2 unit tests failed: test_foo, test_bar"
    artifacts:
      - { type: validation, label: Validation, value: "/runs/issue-5678/run-001/validation-record.json" }
      - { type: run_dir, label: Run Dir, value: "/runs/issue-5678/run-001" }
  - event: validation.retry
    status: failed
    narrative: "Validation failed — retrying"
    detail: "2 unit tests failed: test_foo, test_bar. Source: make test-unit"
  - { event: agent.coding_started, status: started, narrative: "Coding agent started" }
  - { event: agent.coding_completed, status: completed, narrative: "Agent finished coding" }
  - event: agent.completed
    status: completed
    narrative: "Issue completed"
    detail: "Fixed the failing tests"
  - event: validation.passed
    status: completed
    narrative: "Validation passed"
    artifacts:
      - { type: validation, label: Validation, value: "/runs/issue-5678/run-002/validation-record.json" }
  - event: pr.created
    status: completed
    narrative: "PR #99 created"
    artifacts:
      - { type: pull_request, label: PR, value: "https://github.com/example/repo/pull/99" }
  - { event: issue.completed, status: completed, narrative: "Issue completed" }
