scenario: validation_failed_then_retry
description: |
  Validation failure flow: agent codes, completes, validation runs and
  FAILS with a clear reason, retry is requested, agent codes again,
  validation passes, PR is created and issue completes.

  This is the failure-narrative path. The fixture pins:

    - **Order** — events in the exact retry sequence the user sees.
    - **`detail`** — the `validation_reason` carried into the
      user-facing `detail` field (so the user can read *why* it failed).
    - **`artifacts`** — the `validation_record_path` link (so the user
      can navigate to the failure log) and the PR url once created.
    - **`status` transitions** — `validation_failed` → `failed`,
      `validation_retry_needed` → `failed`, `validation_passed` →
      `completed`.

  Discovered behaviors pinned (intentionally — these are the kinds of
  user-facing rough edges goldens are meant to surface for follow-up):

    - The narrative for `session.completed` is `"Issue completed"`
      (from `VIEW_REGISTRY`), so a retry scenario shows that line
      twice plus once for the actual `issue.completed`. The user
      sees three "Issue completed" lines for one issue, which is
      misleading. Worth a follow-up to differentiate
      `agent.completed` vs `issue.completed` narratives.
    - `validation_retry_needed.detail` concatenates the original
      validation reason with `"Source: <cmd>"`. Reasonable, but
      formatting could be improved.

issue_number: 5678

