  - event: session.started
    timestamp: "2026-05-04T00:04:00Z"
    data:
      issue_number: 5678
      session_id: "issue-5678-2"
      agent: coder
      task: code

  - event: observation.completion_detected
    timestamp: "2026-05-04T00:05:00Z"
    data:
      issue_number: 5678
      session_id: "issue-5678-2"

  - event: session.completed
    timestamp: "2026-05-04T00:06:00Z"
    data:
      issue_number: 5678
      session_id: "issue-5678-2"
      implementation: "Fixed the failing tests"

  - event: validation.started
    timestamp: "2026-05-04T00:06:30Z"
    data:
      issue_number: 5678
      session_id: "issue-5678-2"

  - event: validation.completed
    timestamp: "2026-05-04T00:07:00Z"
    data:
      issue_number: 5678
      session_id: "issue-5678-2"

