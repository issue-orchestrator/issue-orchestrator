scenario: rework_then_approved
description: |
  Reviewer-requested rework that is fixed and then approved on the
  next round.

  The fixture aligns with the **actual emitter** in
  `src/issue_orchestrator/control/review_exchange_loop.py`. Pinning
  any one production path is necessary; mixing paths or pinning the
  view-model expected output (rather than the emitter) gives false
  confidence (PR #6157 review).

  Per round, the loop emits:

    - `REVIEW_EXCHANGE_ROUND_STARTED` (line 222) — opens the round.
    - `REVIEW_EXCHANGE_ROLE_PROMPTED` (line 230) — reviewer prompt
      sent.
    - reviewer runs.
    - `REVIEW_EXCHANGE_ROLE_FEEDBACK` (line 257) — reviewer verdict.

  When the reviewer says `needs_work` (rework path inside the round,
  `_emit_coder_prompt_ready` + post-coder block, lines 351-447):

    - `REVIEW_REWORK_STARTED` (line 353) — *inside* the round.
    - `REVIEW_EXCHANGE_ROLE_PROMPTED` (line 363) — coder prompt sent.
    - coder runs.
    - `REVIEW_EXCHANGE_ROLE_FEEDBACK` (line 411) — coder verdict.
    - `REVIEW_REWORK_COMPLETED` (line 429).
    - `REVIEW_EXCHANGE_ROUND_COMPLETED` (line 439) — closes the round.

  When the reviewer says `ok` (`_complete_with_reviewer_ok`,
  lines 509-547):

    - `REVIEW_EXCHANGE_ROUND_COMPLETED` (line 525) with
      `coder_response_type: null`.
    - `REVIEW_EXCHANGE_COMPLETED` (line 533) with `status: ok`.

  Then the orchestrator's completion processor maps the loop outcome
  to `review.approved` (`completion_processor.py` ~line 710:
  `event_name = REVIEW_APPROVED if approved else
  REVIEW_CHANGES_REQUESTED`).

  This fixture explicitly does NOT mix in events from
  `execution/review_exchange_local_loop.py` or
  `execution/persistent_session_exchange.py` — those paths do not
  emit `review.rework_started` / `review.rework_completed` and would
  warrant separate fixtures.

issue_number: 7777

records:
  # Initial coder pass: session.started → session.completed.
  - event: session.started
    timestamp: "2026-05-04T00:00:00Z"
    data:
      issue_number: 7777
      session_id: "issue-7777-1"
      agent: coder
      task: code

  - event: session.completed
    timestamp: "2026-05-04T00:02:00Z"
    data:
      issue_number: 7777
      session_id: "issue-7777-1"
      implementation: "Initial feature"

  - event: session.validation_passed
    timestamp: "2026-05-04T00:03:00Z"
    data:
      issue_number: 7777
      session_id: "issue-7777-1"

  - event: issue.pr_created
    timestamp: "2026-05-04T00:03:30Z"
    data:
      issue_number: 7777
      pr_number: 88
      pr_url: "https://github.com/example/repo/pull/88"

  - event: review.started
    timestamp: "2026-05-04T00:04:00Z"
    data:
      issue_number: 7777
      task: review

  - event: review_exchange.started
    timestamp: "2026-05-04T00:04:01Z"
    data:
      issue_number: 7777
      task: review

  # ============== Round 1: reviewer says needs_work → rework ==============
  - event: review_exchange.round_started
    timestamp: "2026-05-04T00:04:02Z"
    data:
      issue_number: 7777
      task: review
      round_index: 1

  - event: review_exchange.role_prompted
    timestamp: "2026-05-04T00:04:03Z"
    data:
      issue_number: 7777
      task: review
      round_index: 1
      role: reviewer

  - event: review_exchange.role_feedback
    timestamp: "2026-05-04T00:04:25Z"
    data:
      issue_number: 7777
      task: review
      round_index: 1
      role: reviewer
      response_type: needs_work
      getting_closer: false

  - event: review.rework_started
    timestamp: "2026-05-04T00:04:26Z"
    data:
      issue_number: 7777
      task: rework
      round_index: 1
      reviewer_response_type: needs_work
      reviewer_response_text: "Missing tests for the new error path"

  - event: review_exchange.role_prompted
    timestamp: "2026-05-04T00:04:27Z"
    data:
      issue_number: 7777
      task: rework
      round_index: 1
      role: coder

  - event: review_exchange.role_feedback
    timestamp: "2026-05-04T00:06:30Z"
    data:
      issue_number: 7777
      task: rework
      round_index: 1
      role: coder
      response_type: ok
      getting_closer: true

  - event: review.rework_completed
    timestamp: "2026-05-04T00:06:31Z"
    data:
      issue_number: 7777
      task: rework
      round_index: 1
      reviewer_response_type: needs_work
      reviewer_response_text: "Missing tests for the new error path"
      coder_response_type: ok
      coder_response_text: "Tests added"

  - event: review_exchange.round_completed
    timestamp: "2026-05-04T00:06:32Z"
    data:
      issue_number: 7777
      task: review
      round_index: 1
      reviewer_response_type: needs_work
      reviewer_response_text: "Missing tests for the new error path"
      coder_response_type: ok
      coder_response_text: "Tests added"

  # ============== Round 2: reviewer says ok → exchange completes ==============
  - event: review_exchange.round_started
    timestamp: "2026-05-04T00:08:00Z"
    data:
      issue_number: 7777
      task: review
      round_index: 2

  - event: review_exchange.role_prompted
    timestamp: "2026-05-04T00:08:01Z"
    data:
      issue_number: 7777
      task: review
      round_index: 2
      role: reviewer

  - event: review_exchange.role_feedback
    timestamp: "2026-05-04T00:08:25Z"
    data:
      issue_number: 7777
      task: review
      round_index: 2
      role: reviewer
      response_type: ok
      getting_closer: true

  # `_complete_with_reviewer_ok` emits round_completed with
  # coder_response_type=None then review_exchange.completed with
  # status=ok.
  - event: review_exchange.round_completed
    timestamp: "2026-05-04T00:08:26Z"
    data:
      issue_number: 7777
      task: review
      round_index: 2
      reviewer_response_type: ok
      reviewer_response_text: "Looks good now"
      coder_response_type: null

  - event: review_exchange.completed
    timestamp: "2026-05-04T00:08:27Z"
    data:
      issue_number: 7777
      task: review
      rounds: 2
      status: ok
      reason: reviewer_ok

  # `completion_processor.py` maps the ok outcome to REVIEW_APPROVED.
  # `_emit_review_outcome()` publishes the approval text under
  # `summary` (not `review_summary`), per
  # `control/completion_processor.py` ~line 695-715.
  - event: review.approved
    timestamp: "2026-05-04T00:08:28Z"
    data:
      issue_number: 7777
      task: review
      rounds: 2
      summary: "Looks good now"

  - event: review.merged
    timestamp: "2026-05-04T00:09:00Z"
    data:
      issue_number: 7777

  - event: issue.completed
    timestamp: "2026-05-04T00:09:30Z"
    data:
      issue_number: 7777

