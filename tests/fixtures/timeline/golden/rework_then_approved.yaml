scenario: rework_then_approved
description: |
  Reviewer-requested rework that is fixed and then approved on the
  next round.

  This fixture aligns with the production emission sequence
  documented in `tests/integration/test_timeline_integration.py`
  (cycle layout: cycle 1 = Coding + Review with `round_completed`
  carrying `reviewer_response_type=changes_requested`; cycle 2 =
  Rework + Review with `rework_started/completed` then a fresh
  `round_started/completed` and approval) and in
  `tests/unit/test_logical_run_scenarios.py`
  ("local_loop_two_review_rounds_split_into_two_cycles").

  Critical orderings pinned:

    - **`round_index=1` for the first rework.** The rework cycle
      that follows round 1's needs_work verdict carries
      `round_index=1` (the round it is rework *for*), not 2.
    - **`review.rework_started` follows `review_exchange.round_completed`
      for round 1**, not vice versa. `review_exchange_loop.py` has
      a different inline ordering for the persistent-session path,
      but this fixture models the canonical view-model output that
      the dashboard actually displays.
    - **`review.changes_requested` is NOT emitted in this flow.**
      That terminal event fires only when a review session
      completes without approval (see
      `control/completion_processor.py` ~line 710). Successful
      rework-then-approve produces only `review.approved` at the
      end. A separate fixture would model the terminal-rejection
      case.

  Goldens that mixed these two flows in earlier drafts caught a
  real review finding (PR #6157): "passing projection over a
  synthetic sequence is not enough." This rewrite aligns the
  fixture with one specific production path so it actually
  protects long-running timeline behavior.

issue_number: 7777

