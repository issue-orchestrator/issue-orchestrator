      issue_number: 7777
      pr_number: 88
      task: rework
      round_index: 1
      coder_response_type: ok
      coder_response_text: "Tests added"

  - event: review_exchange.round_started
    timestamp: "2026-05-04T00:08:00Z"
    data:
      issue_number: 7777
      pr_number: 88
      task: review
      round_index: 2

  - event: review_exchange.round_completed
    timestamp: "2026-05-04T00:08:30Z"
    data:
      issue_number: 7777
      pr_number: 88
      task: review
      round_index: 2
      reviewer_response_type: ok
      reviewer_response_text: "Looks good now"

  - event: review_exchange.completed
    timestamp: "2026-05-04T00:08:31Z"
    data:
      issue_number: 7777
      pr_number: 88
      task: review
      rounds: 2

  - event: review.approved
    timestamp: "2026-05-04T00:08:32Z"
    data:
      issue_number: 7777
      pr_number: 88
      task: review
      rounds: 2
      review_summary: "Approved on round 2"

  - event: review.merged
    timestamp: "2026-05-04T00:09:00Z"
    data:
      issue_number: 7777
      pr_number: 88

  - event: issue.completed
    timestamp: "2026-05-04T00:09:30Z"
    data:
      issue_number: 7777

