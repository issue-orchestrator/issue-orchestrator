    timestamp: "2026-05-04T00:04:02Z"
    data: { issue_number: 7777, session_name: "issue-7777-exchange-1", round_index: 1 }

  - event: review_exchange.chapter_recorded
    timestamp: "2026-05-04T00:04:03Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: reviewer
      section: prompt
      recording_event_index: 0
      label: "Round 1 reviewer prompt"

  - event: review_exchange.role_prompted
    timestamp: "2026-05-04T00:04:04Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: reviewer
      prompt_chars: 1234

  - event: review_exchange.chapter_recorded
    timestamp: "2026-05-04T00:04:25Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: reviewer
      section: feedback
      recording_event_index: 42
      label: "Round 1 reviewer feedback"

  - event: review_exchange.role_feedback
    timestamp: "2026-05-04T00:04:26Z"
