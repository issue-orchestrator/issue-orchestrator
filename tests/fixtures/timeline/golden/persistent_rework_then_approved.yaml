scenario: persistent_rework_then_approved
description: |
  Reviewer-requested rework that is fixed and then approved on the
  next round, modelled against the **post-cutover persistent-session
  review-exchange runner**
  (`src/issue_orchestrator/execution/persistent_session_exchange.py`).

  History note. The pre-cutover fixture (`rework_then_approved.yaml`)
  pinned events from `control/review_exchange_loop.py` — including
  `review.rework_started` / `review.rework_completed`. PRs #6160 /
  #6161 / #6166 / #6168 deleted that path; the file kept after #6160
  is gutted to a single helper. The persistent runner does **not**
  emit any `review.rework_*` event — the rework concept is implicit
  in the "needs_work → coder turn" flow inside a single round.

  Per-round emission order (per `persistent_session_exchange.py:382-557`):

    Reviewer turn:
      1. `REVIEW_EXCHANGE_ROUND_STARTED`            (line 382)
      2. `REVIEW_EXCHANGE_CHAPTER_RECORDED` for reviewer prompt
         (`section: prompt`)                        (line 387 → 1041)
      3. `REVIEW_EXCHANGE_ROLE_PROMPTED` for reviewer
                                                    (line 400)
      4. `REVIEW_EXCHANGE_CHAPTER_RECORDED` for reviewer feedback
         (`section: feedback`)                      (line 744 → 1041)
      5. `REVIEW_EXCHANGE_ROLE_FEEDBACK` for reviewer
                                                    (line 757)

    If reviewer says `ok` (terminal):
      6a. `REVIEW_EXCHANGE_ROUND_COMPLETED` with
          `coder_response_type: null`                (line 816)
      7a. `REVIEW_EXCHANGE_COMPLETED` with `status: ok`
                                                    (line 824)

    If reviewer says `needs_work` (coder turn within the same round):
      6b. `REVIEW_EXCHANGE_CHAPTER_RECORDED` for coder prompt
                                                    (line 478 → 1041)
      7b. `REVIEW_EXCHANGE_ROLE_PROMPTED` for coder  (line 491)
      8b. `REVIEW_EXCHANGE_CHAPTER_RECORDED` for coder feedback
                                                    (line 744 → 1041)
      9b. `REVIEW_EXCHANGE_ROLE_FEEDBACK` for coder  (line 757)
      10b. `REVIEW_EXCHANGE_ROUND_COMPLETED` with full data
                                                    (line 549)
      → loop continues to next round.

  The orchestrator's `CompletionProcessor._emit_review_outcome()`
  (`control/completion_processor.py:668-715`) then maps the outcome
  to `REVIEW_APPROVED` (carrying `summary` from the reviewer's
  `response_text`).

  Pinned in this fixture:

    - All chapter events (`section`, `role`, `recording_event_index`,
      `label`). They land in `ops` view only — not `user`.
    - All role events with their actual payload shape (no `pr_number`,
      `session_name` not `session_id`).
    - Round-completed payload differences: round 1 carries
      `coder_response_type` populated; the final ok-round carries
      `coder_response_type: null` because no coder turn ran.
    - Final exchange status `"ok"` and reason `"reviewer_ok"`.

issue_number: 7777

