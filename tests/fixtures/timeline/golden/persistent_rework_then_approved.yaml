      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: reviewer
      response_type: needs_work
      getting_closer: false

  - event: review_exchange.chapter_recorded
    timestamp: "2026-05-04T00:04:27Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: coder
      section: prompt
      recording_event_index: 0
      label: "Round 1 coder prompt"

  - event: review_exchange.role_prompted
    timestamp: "2026-05-04T00:04:28Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: coder
      prompt_chars: 980

  - event: review_exchange.chapter_recorded
    timestamp: "2026-05-04T00:06:30Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: coder
      section: feedback
      recording_event_index: 87
      label: "Round 1 coder feedback"

  - event: review_exchange.role_feedback
    timestamp: "2026-05-04T00:06:31Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      role: coder
      response_type: ok
      getting_closer: true

  - event: review_exchange.round_completed
    timestamp: "2026-05-04T00:06:32Z"
    data:
      issue_number: 7777
      session_name: "issue-7777-exchange-1"
      round_index: 1
      reviewer_response_type: needs_work
      reviewer_response_text: "Missing tests for the new error path"
      coder_response_type: ok
