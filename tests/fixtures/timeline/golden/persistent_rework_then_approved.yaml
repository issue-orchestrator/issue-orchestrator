  # `CompletionProcessor._emit_review_outcome` maps ok → REVIEW_APPROVED.
  # Carries `summary` (the reviewer's response_text), `rounds`, no pr_number.
  - event: review.approved
    timestamp: "2026-05-04T00:08:29Z"
    data:
      issue_number: 7777
      task: review
      agent: reviewer
      review_exchange_mode: persistent
      rounds: 2
      summary: "Looks good now"

  - event: review.merged
