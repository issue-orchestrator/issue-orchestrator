# Repo-specific pre-push runtime guardrail for issue-orchestrator.
#
# The guard reads the shared .git/issue-orchestrator/validate-timings.jsonl
# records emitted by prepush_check and fails the hook when the latest uncached,
# successful publish validation for the current HEAD exceeds either budget.
#
# Maintainers should run `make validate-pr` to seed the pre-push cache. The
# command below is the recorded inner publish command used to select timing
# records; running the raw target directly bypasses the cache-aware wrapper.
pre_push_runtime:
  enabled: true
  command: "make validate-pr-raw"
  metric: "validation_elapsed_seconds"
  baseline_seconds: 540
  # Raised 240 -> 330 (cap 780 -> 870s, still < the 900s hard max_seconds):
  # the ADR-0031 triage-tech-lead stack (#6768-#6779) added hundreds of unit
  # tests and the live-CLI agent phases run slower under current API latency, so
  # a clean validate-pr now measures ~780s — the prior cap false-positived on
  # accumulated/environmental runtime, not a real per-change regression.
  max_increase_seconds: 330
  max_seconds: 900
