version: 1

rules:
  - id: oversized_control_hotspots
    type: file_line_budget
    description: >
      Prevent high-risk control files from growing without explicit ratchet
      approval. Existing hotspots are baselined; PRs fail when they increase
      tracked line counts or introduce a new over-budget file.
    max_lines: 800
    include:
      - src/issue_orchestrator/control/**/*.py
      - src/issue_orchestrator/entrypoints/**/*.py
      - src/issue_orchestrator/execution/**/*.py
      - src/issue_orchestrator/infra/**/*.py
      - src/issue_orchestrator/view_models/**/*.py
    exclude:
      - src/issue_orchestrator/infra/settings_schema.py

  - id: ruff_complexity_noqa
    type: ruff_findings
    description: >
      Ratchet Ruff's C901 McCabe complexity findings with noqa suppressions
      ignored. Normal Ruff validation already blocks unsuppressed complexity
      regressions; this guardrail inventories existing suppressed complexity
      debt and fails PRs that make those functions more complex.
    include:
      - src/**/*.py
      - packages/agent_runner/src/**/*.py
    select:
      - C901
    ignore_noqa: true

  - id: ruff_noqa_suppressions
    type: ruff_noqa_suppressions
    description: >
      Ratchet Ruff suppressions themselves. A `# noqa` is an intentional
      escape hatch from analyzer enforcement; existing suppressions are
      baselined, but new suppressions must be explicitly accepted rather than
      silently bypassing validation.
    include:
      - src/**/*.py
      - packages/agent_runner/src/**/*.py

  - id: semgrep_owner_boundaries
    type: semgrep_findings
    description: >
      Ratchet repo-specific owner-boundary findings from Semgrep. Semgrep owns
      Python AST pattern matching; this guardrail only normalizes and ratchets
      the findings so new runtime-state mutation sites cannot spread silently.
    config: tools/semgrep/owner_boundaries.yml
    include:
      - src/issue_orchestrator/**/*.py

  - id: semgrep_typed_seams
    type: semgrep_findings
    description: >
      Ratchet raw public seam payload builders from Semgrep. Public API,
      event, and view-model seams should move toward typed contracts/models
      instead of new raw dict/list-of-dict return surfaces.
    config: tools/semgrep/typed_seams.yml
    include:
      - src/issue_orchestrator/contracts/**/*.py
      - src/issue_orchestrator/entrypoints/**/*.py
      - src/issue_orchestrator/events/**/*.py
      - src/issue_orchestrator/view_models/**/*.py

  - id: control_policy_branch_sites
    type: control_policy_branch_sites
    new_metric_min_value: 3
    description: >
      Track branch sites that mention lifecycle/control vocabulary. This is a
      proxy for control-policy scatter: adding new decision sites should be
      intentional and should normally route through an owner or decision table.
      New files with one or two matches are reported but do not fail the ratchet
      until they cross this rule's `new_metric_min_value`.
    include:
      - src/issue_orchestrator/control/**/*.py
      - src/issue_orchestrator/entrypoints/**/*.py
      - src/issue_orchestrator/execution/**/*.py
      - src/issue_orchestrator/infra/**/*.py
      - src/issue_orchestrator/static/**/*.js
      - src/issue_orchestrator/view_models/**/*.py
    exclude:
      - src/issue_orchestrator/infra/settings_schema.py
      - src/issue_orchestrator/static/vendor/**
    terms:
      - review_exchange
      - review exchange
      - review-exchange
      - completion
      - retry
      - reset
      - requeue
      - timeout
      - timed_out
      - session_state
      - status
      - reason
      - label
      - validation
