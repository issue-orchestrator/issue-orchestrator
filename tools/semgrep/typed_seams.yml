rules:
  - id: issue-orchestrator.raw-public-seam-dict-return
    languages:
      - python
    severity: WARNING
    message: Route public seam payloads through typed contracts or models instead of raw dict/list-of-dict return annotations.
    pattern-either:
      - pattern: |
          def $FUNC(...) -> dict[str, $VALUE]:
              ...
      - pattern: |
          def $FUNC(...) -> Dict[str, $VALUE]:
              ...
      - pattern: |
          async def $FUNC(...) -> dict[str, $VALUE]:
              ...
      - pattern: |
          async def $FUNC(...) -> Dict[str, $VALUE]:
              ...
      - pattern: |
          def $FUNC(...) -> dict[str, $VALUE] | None:
              ...
      - pattern: |
          def $FUNC(...) -> Dict[str, $VALUE] | None:
              ...
      - pattern: |
          def $FUNC(...) -> Optional[dict[str, $VALUE]]:
              ...
      - pattern: |
          def $FUNC(...) -> Optional[Dict[str, $VALUE]]:
              ...
      - pattern: |
          async def $FUNC(...) -> dict[str, $VALUE] | None:
              ...
      - pattern: |
          async def $FUNC(...) -> Dict[str, $VALUE] | None:
              ...
      - pattern: |
          async def $FUNC(...) -> Optional[dict[str, $VALUE]]:
              ...
      - pattern: |
          async def $FUNC(...) -> Optional[Dict[str, $VALUE]]:
              ...
      - pattern: |
          def $FUNC(...) -> list[dict[str, $VALUE]]:
              ...
      - pattern: |
          def $FUNC(...) -> list[Dict[str, $VALUE]]:
              ...
      - pattern: |
          def $FUNC(...) -> List[dict[str, $VALUE]]:
              ...
      - pattern: |
          def $FUNC(...) -> List[Dict[str, $VALUE]]:
              ...
      - pattern: |
          async def $FUNC(...) -> list[dict[str, $VALUE]]:
              ...
      - pattern: |
          async def $FUNC(...) -> list[Dict[str, $VALUE]]:
              ...
      - pattern: |
          async def $FUNC(...) -> List[dict[str, $VALUE]]:
              ...
      - pattern: |
          async def $FUNC(...) -> List[Dict[str, $VALUE]]:
              ...
      - pattern: |
          def $FUNC(...) -> list[dict[str, $VALUE]] | None:
              ...
      - pattern: |
          def $FUNC(...) -> list[Dict[str, $VALUE]] | None:
              ...
      - pattern: |
          def $FUNC(...) -> List[dict[str, $VALUE]] | None:
              ...
      - pattern: |
          def $FUNC(...) -> List[Dict[str, $VALUE]] | None:
              ...
      - pattern: |
          def $FUNC(...) -> Optional[list[dict[str, $VALUE]]]:
              ...
      - pattern: |
          def $FUNC(...) -> Optional[list[Dict[str, $VALUE]]]:
              ...
      - pattern: |
          def $FUNC(...) -> Optional[List[dict[str, $VALUE]]]:
              ...
      - pattern: |
          def $FUNC(...) -> Optional[List[Dict[str, $VALUE]]]:
              ...
      - pattern: |
          async def $FUNC(...) -> list[dict[str, $VALUE]] | None:
              ...
      - pattern: |
          async def $FUNC(...) -> list[Dict[str, $VALUE]] | None:
              ...
      - pattern: |
          async def $FUNC(...) -> List[dict[str, $VALUE]] | None:
              ...
      - pattern: |
          async def $FUNC(...) -> List[Dict[str, $VALUE]] | None:
              ...
      - pattern: |
          async def $FUNC(...) -> Optional[list[dict[str, $VALUE]]]:
              ...
      - pattern: |
          async def $FUNC(...) -> Optional[list[Dict[str, $VALUE]]]:
              ...
      - pattern: |
          async def $FUNC(...) -> Optional[List[dict[str, $VALUE]]]:
              ...
      - pattern: |
          async def $FUNC(...) -> Optional[List[Dict[str, $VALUE]]]:
              ...
