# AST Guardrails Configuration (Option A: small, high-signal)

# Layer boundary rules: prevent certain paths from importing certain modules
# This enforces hexagonal architecture by ensuring entrypoints use protocols, not adapters
layer_boundaries:
  - name: entrypoints_no_adapters
    description: "Entrypoints must use protocols, not import adapters directly"
    deny_in:
      - src/issue_orchestrator/entrypoints
    deny_imports:
      - issue_orchestrator.adapters
    allow:
      # bootstrap.py is the composition root - it wires adapters to protocols
      - src/issue_orchestrator/entrypoints/bootstrap.py

allow_prefixes:
  - src/issue_orchestrator/execution
  - src/issue_orchestrator/adapters
  - src/issue_orchestrator/entrypoints/cli.py
  - src/issue_orchestrator/entrypoints/control_api.py  # Passthrough calls to orchestrator
  - src/issue_orchestrator/adapters/terminal/_iterm2.py
  - src/issue_orchestrator/adapters/worktree/_worktree.py
  - src/issue_orchestrator/infra/hooks/hooks.py
  - src/issue_orchestrator/infra/supervisor.py  # Supervisor manages orchestrator subprocesses
  - src/issue_orchestrator/infra/ai_diagnose.py  # AI diagnosis invokes claude
  - src/issue_orchestrator/entrypoints/cli_tools/setup_wizard.py
  - src/issue_orchestrator/entrypoints/web.py
  - src/issue_orchestrator/control/scheduler.py

deny_attr_calls:
  - name: control_no_cached_label_reads
    description: "Control/observation must use fresh label reads"
    deny_in:
      - src/issue_orchestrator/control
      - src/issue_orchestrator/observation
    deny_attr_names:
      - get_issue_labels

deny_git_subprocess: true
allow_git_subprocess_prefixes:
  - src/issue_orchestrator/execution
  - src/issue_orchestrator/adapters
  - src/issue_orchestrator/adapters/worktree/_worktree.py
  - src/issue_orchestrator/infra/hooks/hooks.py
  - src/issue_orchestrator/entrypoints/cli_tools/setup_wizard.py

deny_imports:
  - subprocess
  - httpx
  - issue_orchestrator._github_impl

deny_dynamic_imports:
  - subprocess
  - httpx
  - issue_orchestrator._github_impl

deny_dynamic_any:
  - __import__
  - importlib.import_module

deny_calls:
  - subprocess.run
  - subprocess.Popen
  - subprocess.call
  - subprocess.check_call
  - subprocess.check_output

deny_os_system_like: true
