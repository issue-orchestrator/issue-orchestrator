# AST Guardrails Configuration (Option A: small, high-signal)

# Layer boundary rules: prevent certain paths from importing certain modules
# This enforces hexagonal architecture by ensuring entrypoints use protocols, not adapters
layer_boundaries:
  - name: entrypoints_no_adapters
    description: "Entrypoints must use protocols, not import adapters directly"
    deny_in:
      - src/issue_orchestrator/entrypoints
    deny_imports:
      - issue_orchestrator.adapters
    allow:
      # bootstrap.py is the composition root - it wires adapters to protocols
      - src/issue_orchestrator/entrypoints/bootstrap.py
      # provider factory (when introduced) is part of composition wiring
      - src/issue_orchestrator/entrypoints/repository_host_factory.py
  - name: core_no_github_adapter_imports
    description: "Core control and observation layers must not import GitHub adapters directly"
    deny_in:
      - src/issue_orchestrator/control
      - src/issue_orchestrator/observation
    deny_imports:
      - issue_orchestrator.adapters.github
  - name: entrypoints_no_github_adapter_imports
    description: "Entrypoints must route GitHub adapter wiring through composition root/factory only"
    deny_in:
      - src/issue_orchestrator/entrypoints
    deny_imports:
      - issue_orchestrator.adapters.github
    allow:
      - src/issue_orchestrator/entrypoints/bootstrap.py
      - src/issue_orchestrator/entrypoints/repository_host_factory.py

deny_symbol_refs:
  - name: layers_no_github_symbol_refs
    description: "Avoid concrete GitHub symbol coupling outside composition root/factory"
    deny_in:
      - src/issue_orchestrator/control
      - src/issue_orchestrator/observation
      - src/issue_orchestrator/entrypoints
    deny_symbols:
      - GitHubAdapter
      - GitHubIssueResolver
      - GitHubClaimAdapter
      - GitHubFreshIssueReader
      - GitHubCache
      - GitHubHttpClient
    allow:
      - src/issue_orchestrator/entrypoints/bootstrap.py
      - src/issue_orchestrator/entrypoints/repository_host_factory.py

allow_prefixes:
  - src/issue_orchestrator/execution
  - src/issue_orchestrator/adapters
  # _vendor/agent_runner has been fully migrated to execution/
  - src/issue_orchestrator/entrypoints/cli.py
  - src/issue_orchestrator/entrypoints/control_api.py  # Passthrough calls to orchestrator
  - src/issue_orchestrator/adapters/terminal/_iterm2.py
  - src/issue_orchestrator/adapters/worktree/_worktree.py
  - src/issue_orchestrator/infra/hooks/hooks.py
  - src/issue_orchestrator/infra/supervisor.py  # Supervisor manages orchestrator subprocesses
  - src/issue_orchestrator/infra/shutdown_signals.py  # Resolves signal-sender command line via `ps` for attribution
  - src/issue_orchestrator/infra/ai_diagnose.py  # AI diagnosis invokes claude
  - src/issue_orchestrator/entrypoints/cli_tools/setup_wizard.py
  - src/issue_orchestrator/entrypoints/cli_tools/coding_done.py  # CLI tool runs git status in agent worktree
  - src/issue_orchestrator/entrypoints/cli_tools/validate_runner.py  # Runs validation commands
  - src/issue_orchestrator/entrypoints/web.py
  - src/issue_orchestrator/control/scheduler.py
  - src/issue_orchestrator/entrypoints/e2e_worker.py  # E2E worker subprocess
  - src/issue_orchestrator/infra/e2e_runner.py  # E2E runner spawns workers
  - src/issue_orchestrator/infra/e2e_worktree.py  # E2E worktree management (git + uv)

deny_attr_calls:
  - name: control_no_cached_label_reads
    description: "Control/observation must use fresh label reads"
    deny_in:
      - src/issue_orchestrator/control
      - src/issue_orchestrator/observation
    deny_attr_names:
      - get_issue_labels
  - name: control_no_direct_label_mutations
    description: "Control/observation must apply label/comment mutations via ActionApplier"
    deny_in:
      - src/issue_orchestrator/control
      - src/issue_orchestrator/observation
    deny_attr_names:
      - add_label
      - remove_label
      - add_comment
    allow:
      - src/issue_orchestrator/control/action_applier.py
      - src/issue_orchestrator/control/completion_processor.py
      - src/issue_orchestrator/control/label_sync.py
  - name: entrypoints_no_direct_label_mutations
    description: "Entrypoint handlers must apply label/comment mutations via ActionApplier"
    deny_in:
      - src/issue_orchestrator/entrypoints/web.py
      - src/issue_orchestrator/entrypoints/cli.py
    deny_attr_names:
      - add_label
      - remove_label
      - add_comment

deny_git_subprocess: true
allow_git_subprocess_prefixes:
  - src/issue_orchestrator/execution
  - src/issue_orchestrator/adapters
  - src/issue_orchestrator/adapters/worktree/_worktree.py
  - src/issue_orchestrator/infra/hooks/hooks.py
  - src/issue_orchestrator/entrypoints/cli_tools/setup_wizard.py
  - src/issue_orchestrator/entrypoints/cli_tools/coding_done.py  # CLI tool checks git status in agent worktree
  - src/issue_orchestrator/entrypoints/e2e_worker.py  # E2E worker gets git info
  - src/issue_orchestrator/infra/e2e_runner.py  # E2E runner checks main HEAD
  - src/issue_orchestrator/infra/e2e_worktree.py  # E2E worktree management (git + uv)

deny_imports:
  - subprocess
  - httpx
  - issue_orchestrator._github_impl

deny_dynamic_imports:
  - subprocess
  - httpx
  - issue_orchestrator._github_impl

deny_dynamic_any:
  - __import__
  - importlib.import_module

deny_calls:
  - subprocess.run
  - subprocess.Popen
  - subprocess.call
  - subprocess.check_call
  - subprocess.check_output

deny_os_system_like: true
