# Migrated to sectioned format

repo:
  name: issue-orchestrator/issue-orchestrator
  github:
    app:
      client_id: "Iv23lijSPfPiSZ4Dmgjz"
      app_id: "4250697"
      installation_id: "145305179"
      private_key_path: "~/.config/issue-orchestrator/github-apps/issue-orchestrator-bot.private-key.pem"

worktrees:
  base: "../"
  worktree_branch_on_recreate: delete
  setup:
    - make worktree-setup

agents:
  agent:backend:
    prompt: repo-specific/prompts/simple-fix.md
    provider: "claude-code"
    ai_system: "claude-code"
    model: "opus"
    timeout_minutes: 90
    reviewer: "agent:reviewer"
    provider_args:
      effort: "xhigh"
      permission_mode: "bypassPermissions"
  agent:frontend:
    prompt: repo-specific/prompts/simple-fix.md
    provider: "claude-code"
    ai_system: "claude-code"
    model: "opus"
    timeout_minutes: 90
    reviewer: "agent:reviewer"
    provider_args:
      effort: "xhigh"
      permission_mode: "bypassPermissions"
  agent:mobile:
    prompt: repo-specific/prompts/simple-fix.md
    provider: "claude-code"
    ai_system: "claude-code"
    model: "opus"
    timeout_minutes: 90
    reviewer: "agent:reviewer"
    provider_args:
      effort: "xhigh"
      permission_mode: "bypassPermissions"
  agent:reviewer:
    prompt: repo-specific/prompts/reviewer.md
    provider: "codex"
    ai_system: "codex"
    model: "gpt-5.6-sol"
    timeout_minutes: 45
    provider_args:
      approval_mode: "full-auto"
      sandbox: "workspace-write"
      reasoning_effort: "xhigh"
  agent:triage:
    prompt: repo-specific/prompts/triage.md
    provider: "claude-code"
    ai_system: "claude-code"
    model: "opus"
    timeout_minutes: 90
    reviewer: "agent:reviewer"
    provider_args:
      effort: "xhigh"
      permission_mode: "bypassPermissions"
    initial_prompt: "Triage review for issue #{issue_number}: {issue_title}. Follow the instructions in {prompt}. When done, use coding-done to report completion."
  agent:goal-pilot:
    prompt: repo-specific/prompts/goal-pilot.md
    provider: codex
    model: gpt-5.6-sol
    ai_system: codex
    provider_args:
      approval_mode: full-auto
      sandbox: workspace-write

execution:
  concurrency:
    max_concurrent_sessions: 1
    session_timeout_minutes: 160
  terminal_adapter: subprocess

review:
  enabled: true
  default: agent:reviewer
  code_review_label: needs-code-review
  code_reviewed_label: code-reviewed
  max_rework_cycles: 10
  nits:
    default_policy: "address"
    by_agent: {}
  exchange:
    # Persistent coder<->reviewer exchange (code default; explicit for clarity,
    # matching tixmeup's config).
    mode: "via-local-loop"

# Route approved PRs through GitHub's native merge queue instead of reworking
# them merely for being behind base. Requires the repo's branch protection to
# have the merge queue enabled; otherwise enqueue attempts fail (logged, not
# fatal). Conflicts and failed required checks still go to rework.
merge_queue:
  enabled: true
  provider: "github"
  enqueue_after: "code-reviewed"
  failure_action: "rework"

validation:
  quick:
    cmd: make validate-quick
    timeout_seconds: 600
  publish:
    cmd: make validate-pr-raw
    # This repo's local publish gate runs the full PR validation slice
    # (unit/integration/web/vscode) and routinely exceeds 300s on busy machines,
    # even without any live agent work in the loop.
    timeout_seconds: 1800
    dirty_check: tracked
  coverage_guardrail:
    enabled: true
    min_percent: 85
    apply_to: changed
    scope:
      - "src/issue_orchestrator/**"
      - "packages/agent_runner/src/**"
    coverage_type: line
    exclude:
      - "src/issue_orchestrator/generated/**"

filtering:
  exclude_labels: ["io-e2e-test-data", "test-data"]
  exclude_label_prefixes: ["io:e2e:"]

triage:
  inherit_labels: ["io-e2e-test-data", "test-data"]

goal_pilot:
  enabled: true
  agent: agent:goal-pilot

e2e:
  enabled: true
  auto_run_interval_minutes: 240
  runner_kind: pytest
  pytest_args:
    - tests/e2e
    - -v
    - --tb=short
    - --junitxml=.issue-orchestrator/e2e-results/issue-orchestrator-e2e.xml
  junit_xml_paths:
    - .issue-orchestrator/e2e-results/issue-orchestrator-e2e.xml
  allow_retry_once: true
  quarantine_file: tests/e2e/quarantine.txt
  survive_restart: true

hooks:
  ai_gate:
    interval_days: 7
    dangerous_allow_failure: false
