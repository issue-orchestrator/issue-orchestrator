# Migrated to sectioned format

worktrees:
  base: "../"
  worktree_branch_on_recreate: delete

agents:
  agent:backend:
    prompt: .prompts/simple-fix.md
    model: haiku
    ai_system: claude-code
    permission_mode: bypassPermissions
    command: "claude {claude_args} --permission-mode {permission_mode} --model {model} --append-system-prompt 'Read {prompt} for your instructions.' '{initial_prompt}'"
  agent:frontend:
    prompt: .prompts/simple-fix.md
    model: haiku
    ai_system: claude-code
    permission_mode: bypassPermissions
    command: "claude -p {claude_args} --permission-mode {permission_mode} --model {model} --append-system-prompt 'Read {prompt} for your instructions.' '{initial_prompt}'"
  agent:mobile:
    prompt: .prompts/simple-fix.md
    model: haiku
    ai_system: claude-code
    permission_mode: bypassPermissions
    command: "claude -p {claude_args} --permission-mode {permission_mode} --model {model} --append-system-prompt 'Read {prompt} for your instructions.' '{initial_prompt}'"
  agent:reviewer:
    prompt: .prompts/reviewer.md
    model: sonnet
    ai_system: claude-code
    timeout_minutes: 30
    permission_mode: bypassPermissions
    command: "claude -p {claude_args} --permission-mode {permission_mode} --model {model} --append-system-prompt 'Read {prompt} for your instructions.' '{initial_prompt}'"
    initial_prompt: "Review PR #{pr_number} for issue #{issue_number}: {issue_title}. Follow the instructions in {prompt}. When done, use agent-done to report your verdict."
  agent:triage:
    prompt: .prompts/triage.md
    model: sonnet
    ai_system: claude-code
    timeout_minutes: 60
    permission_mode: bypassPermissions
    command: "claude -p {claude_args} --permission-mode {permission_mode} --model {model} --append-system-prompt 'Read {prompt} for your instructions.' '{initial_prompt}'"
    initial_prompt: "Triage review for issue #{issue_number}: {issue_title}. Follow the instructions in {prompt}. When done, use agent-done to report completion."

execution:
  concurrency:
    max_concurrent_sessions: 6
    session_timeout_minutes: 10
  terminal_adapter: subprocess

review:
  enabled: true
  default: agent:reviewer
  code_review_label: needs-code-review
  code_reviewed_label: code-reviewed
  max_rework_cycles: 2

validation:
  cmd: make validate
  timeout_seconds: 300

filtering:
  exclude_labels: ["io-e2e-test-data", "test-data"]

triage:
  inherit_labels: ["io-e2e-test-data", "test-data"]

e2e:
  enabled: true
  auto_run_interval_minutes: 240
  pytest_args: ["tests/e2e", "-v", "--tb=short"]
  allow_retry_once: true
  quarantine_file: tests/e2e/quarantine.txt
  survive_restart: true

config:
  strict: true
