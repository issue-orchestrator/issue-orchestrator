# Issue orchestrator configuration for this repository

# Validation gates - ensure code quality before publishing
validation:
  # Agent gate: runs when agent-done is called
  # If this fails, agent must fix issues before completing
  agent_gate:
    cmd: "make typecheck"  # Fast check - full validation happens at publish gate
    timeout_seconds: 120  # 2 minutes for typecheck only

  # Publish gate: runs in pre-push hook (with caching by commit SHA)
  # NOTE: Excluding e2e tests and claude execution tests (external service dependencies)
  publish_gate:
    cmd: "make typecheck && pytest tests/unit tests/integration -x -q --tb=short --ignore=tests/integration/test_claude_execution.py"
    timeout_seconds: 300  # 5 minutes

# Validation policy
validation_policy:
  agent_runs: "agent_gate"
  publish_requires: "publish_gate"
