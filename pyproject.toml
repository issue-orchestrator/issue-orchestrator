[project]
name = "issue-orchestrator"
version = "0.1.0"
description = "Orchestrate AI agents working on GitHub issues in parallel"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [
    { name = "Bruce Gordon" }
]
keywords = ["ai", "github", "orchestration", "claude", "automation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pyyaml>=6.0",
    "rich>=13.0",      # Nice terminal UI
    "libtmux>=0.37",   # Pythonic tmux control
    "textual>=0.40",   # TUI framework with keyboard input
    "fastapi>=0.104",  # Web dashboard
    "uvicorn>=0.24",   # ASGI server
    "jinja2>=3.1",     # HTML templates
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "pytest-cov>=4.0",
    "pyright>=1.1",
]

[project.scripts]
issue-orchestrator = "issue_orchestrator.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/issue_orchestrator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.pyright]
include = ["src"]
pythonVersion = "3.11"
typeCheckingMode = "basic"
reportMissingImports = true
reportMissingTypeStubs = false
