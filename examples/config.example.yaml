# Example issue-orchestrator configuration
# Copy to your repo as .issue-orchestrator.yaml

# Agent configurations - map issue labels to prompts
agents:
  "agent:backend":
    prompt: ".issue-orchestrator/prompts/backend.md"
    worktree_base: "../"           # Where to create worktrees (relative to repo)
    model: "sonnet"                # Claude model (sonnet, opus, haiku)
    timeout_minutes: 45            # Session timeout
    # command: "claude --model {model} '{initial_prompt}'"  # Custom command
    # repo_root: "/path/to/repo"   # Different repo for this agent

  "agent:frontend":
    prompt: ".issue-orchestrator/prompts/frontend.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 45

  # Domain expert agent (no code, skip code review)
  "agent:domain-expert":
    prompt: ".issue-orchestrator/prompts/domain-expert.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 30
    skip_review: true  # Skip code review for non-code agents

  # Reviewer agent for Stage 1 (per-PR code review)
  "agent:reviewer":
    prompt: ".issue-orchestrator/prompts/reviewer.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 10

  # Triage agent for Stage 2 (batch review)
  "agent:triage":
    prompt: ".issue-orchestrator/prompts/triage-review.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 30

# Concurrency settings
concurrency:
  max_concurrent_sessions: 3                  # Max parallel agent sessions
  session_timeout_minutes: 45      # Default timeout for all agents

# Label names (customize if your repo uses different labels)
labels:
  in_progress: "in-progress"       # Applied when work starts
  blocked: "blocked"               # Applied when agent is blocked
  needs_human: "needs-human"       # Applied when agent needs input
  prefix: ""                       # Optional: prefix all labels (e.g., "bot" -> "bot:in-progress")

# Triage advisory labels (create these in your repo):
# - triage-fix: Issues created by CTO agent recommending fixes
# Triage creates issues with "blocked" + "triage-fix" labels.
# Human reviews, then removes "blocked" to approve the fix.

# UI mode: "tmux" (default), "iterm2" (Mac), or "web" (browser dashboard)
ui_mode: "tmux"
web_port: 8080                         # Port for web dashboard (default: 8080)

# Tab/window cleanup behavior
close_completed_tabs: true         # Auto-close tabs for successful completions
close_failed_tabs: false           # Keep failed tabs open for investigation

# Enforcement options
enforce_hooks: true                # Install pre-push hooks to enforce agent-done usage
# pre_push_hook: "./custom-hook.sh"  # Custom pre-push hook (default: bundled validator)

# Worktree setup commands (run after worktree creation)
# Use this to install dependencies so agents don't have to do it manually
setup_worktree:
  # - "npm install"                  # For JavaScript/TypeScript projects
  # - "pip install -e '.[dev]'"      # For Python projects
  # - "bundle install"               # For Ruby projects
  # - "./scripts/setup.sh"           # Custom setup script

# GitHub settings
# repo: "owner/repo-name"          # Explicit repo (otherwise auto-detected from git remote)
# filter_label: "test-data"        # Only process issues with this label
# filter_milestone: "v1.0"         # Only process issues in this milestone

# Custom comment headings (for tooling integration)
comment_headings:
  implementation: "## Implementation"
  problems: "## Problems Encountered"
  pr_link: "## Pull Request"
  blocked: "## Blocked"
  needs_human: "## Needs Human Input"

# Two-stage code review workflow (recommended)
# Stage 1: Per-PR code review (immediate, after each PR)
code_review_agent: "agent:reviewer"   # Agent that reviews PRs
code_review_label: "needs-code-review"  # Label applied to PRs needing review
code_reviewed_label: "code-reviewed"    # Label after review passes

# Rework iteration (when reviewer requests changes)
# max_rework_cycles: 2                  # Max rework attempts before escalating to needs-human (default: 2)

# Stage 2: Triage batch review (triggered when N reviewed PRs accumulate)
# triage_review_agent: "agent:triage"         # Uncomment to enable batch review
# triage_reviewed_label: "triage-reviewed"    # Label after triage review
# triage_review_threshold: 5               # Trigger after N reviewed PRs
