# Example issue-orchestrator configuration
# Copy to your repo as .issue-orchestrator/config/default.yaml

repo:
  # name: "owner/repo-name"      # Optional override; defaults to git remote
  # root: "/path/to/repo"        # Optional override; defaults to config location
  github:
    # token: "ghp_xxx"            # Optional explicit token (prefer token_env)
    # token_env: "GITHUB_TOKEN"  # Override env var name for token
    api_url: "https://api.github.com"
    http_timeout_seconds: 20
    cache_ttl_seconds: 300
    # required_scopes: []        # Required OAuth scopes (if set, enforced at startup)
    # allowed_scopes: []         # Allowed OAuth scopes (if set, token must be subset)
    write_verify:
      timeout_seconds: 20
      initial_delay_ms: 250
      max_delay_ms: 2000
      backoff: 1.5
      jitter_ms: 0
    rate_limit:
      startup: true
      every_calls: 500
      warn_fraction: 0.1
      warn_remaining: 100
    audit:
      enabled: false
      events: false
      # file: ".issue-orchestrator/gh-audit-{pid}.log"

# Optional defaults applied to agents that omit provider/model/args
default_agent:
  provider: "claude-code"
  model: "sonnet"
  # provider_args:
  #   permission_mode: "bypassPermissions"

agents:
  "agent:backend":
    prompt: ".prompts/backend.md"
    model: "sonnet"
    timeout_minutes: 45
    ai_system: "claude-code"
    # provider: "claude-code"       # Overrides default_agent.provider
    # provider_args: {}               # Provider-specific args, e.g.:
    #   approval_mode: "full-auto"    # Codex
    #   sandbox: "workspace-write"    # Codex
    #   reasoning_effort: "xhigh"     # Codex
    #   permission_mode: "bypassPermissions"  # Claude Code
    # permission_mode: "default"     # Provider-specific permission mode
    # command: "claude --model {model} '{initial_prompt}'"
    # initial_prompt: "Work on issue #{issue_number}: {issue_title}"
    # skip_review: false
    # reviewer: "agent:reviewer"     # Override default reviewer
    # meta_agent: "agent:meta"       # Agent label used to supervise this agent
    # retry_prompt_template: ".prompts/retry.md"

  "agent:frontend":
    prompt: ".prompts/frontend.md"
    model: "sonnet"
    timeout_minutes: 45
    reviewer: "agent:web-reviewer"
    ai_system: "claude-code"

  "agent:domain-expert":
    prompt: ".prompts/domain-expert.md"
    model: "sonnet"
    timeout_minutes: 30
    skip_review: true
    ai_system: "claude-code"

  "agent:reviewer":
    prompt: ".prompts/code-review.md"
    model: "sonnet"
    timeout_minutes: 10
    ai_system: "claude-code"

  "agent:web-reviewer":
    prompt: ".prompts/code-review-web.md"
    model: "sonnet"
    timeout_minutes: 10
    ai_system: "claude-code"

  "agent:triage":
    prompt: ".prompts/triage-review.md"
    model: "sonnet"
    timeout_minutes: 30
    ai_system: "claude-code"

  "agent:goal-pilot":
    prompt: ".prompts/goal-pilot.md"
    model: "sonnet"
    timeout_minutes: 30
    ai_system: "claude-code"

worktrees:
  base: "../"                     # Where to create worktrees (relative to repo)
  # base_branch_override: "main"         # Optional: override base branch (must exist on origin)
  # seed_ref: "HEAD"                     # Optional: local ref to seed fresh issue worktrees during local iteration
  # setup:                               # Commands to run after worktree creation.
  #   - "npm install"                    # No default — configure for YOUR repo.
  #   - "pip install -e '.[dev]'"        # The orchestrator's own setup (hooks,
  #   - "make setup"                     # coding-done, Claude settings) is automatic.
  reuse_push_preflight: true
  allow_no_verify_dry_run_preflight: true
  worktree_branch_on_recreate: "delete"  # delete | create_new_branch
  remediation:
    pr_collision: "new_branch"           # fail | reuse_open | new_branch
    push_rebase_retry: true

execution:
  concurrency:
    max_concurrent_sessions: 3
    session_timeout_minutes: 45
  terminal_adapter: null          # Optional: "subprocess" or custom adapter path
  session_interactions:
    enabled: false                # Auto-respond to trusted runner prompts (for example Claude's trust screen)
  isolation:
    mode: "standard"              # standard or hardened

labels:
  in_progress: "in-progress"
  blocked: "blocked"
  needs_human: "needs-human"
  needs_rework: "needs-rework"
  validation_failed: "validation-failed"
  prefix: ""                      # Optional prefix (e.g., "bot")

review:
  enabled: true
  default: "agent:reviewer"
  code_review_label: "needs-code-review"
  code_reviewed_label: "code-reviewed"
  keep_current_approach_label: "reviewer-keep-current-approach"
  triage_review_agent: "agent:triage"
  triage_review_label: "needs-triage-review"
  triage_reviewed_label: "triage-reviewed"
  triage_failed_label: "triage-failed"
  triage_review_threshold: 0
  triage_review_on_failure: true
  max_rework_cycles: 5
  reviewer_feedback_cache_minutes: 5
  run_audit:
    min_runtime_minutes: 20      # 0 disables auto-audit; label-triggered audits still work
    on_timeout: true             # Capture a run audit whenever a session times out
  exchange:
    mode: "via-local-loop"       # via-local-loop, via-draft-pr, via-mcp (auto optional)
    probe:
      schedule: "daily"          # startup, daily, interval, manual
      interval_days: 1            # used when schedule=interval
    loop:
      max_rounds: 10
      max_no_progress: 2
      require_validation: true

goal_pilot:
  enabled: false
  # agent: "agent:goal-pilot"
  approval_policy: "journeys_only"   # journeys_only | gatekeeper | batch
  approval_batch_size: 10
  approval_batch_window_minutes: 60

cleanup:
  with_triage:
    close_ai_session_tabs: true
    remove_worktrees: false
  without_triage:
    wait_for_code_review: true
    close_ai_session_tabs: true
    remove_worktrees: false

validation:
  quick:
    cmd: "make validate-quick"
    # Fast feedback for coding-done and local coder/reviewer exchanges.
    # Put lightweight repo policy checks here too (for example: reject added
    # test skips such as assumeTrue/assumeFalse/@Disabled in JVM projects).
    timeout_seconds: 300
  publish:
    cmd: "make validate-pr"
    # Authoritative pre-push / pre-publish gate. issue-orchestrator caches
    # successful runs by HEAD SHA + command so git pre-push can reuse them.
    timeout_seconds: 1800
    # tracked = block on staged + unstaged changes (default)
    # all = block on tracked + untracked changes
    # unstaged = allow staged changes, block unstaged changes
    # off = disable dirty-check guard
    dirty_check: "tracked"
  # Optional per-file coverage guardrail (checks only changed files)
  # coverage_guardrail:
  #   enabled: true
  #   min_percent: 85
  #   apply_to: changed
  #   scope:
  #     - "src/issue_orchestrator/**"
  #   coverage_type: "branch"
  #   exclude:
  #     - "src/issue_orchestrator/generated/**"
  # Optional JUnit XML paths emitted by validation commands (relative to worktree, glob OK).
  # When set, failed validations render a structured test-centric view in the
  # dashboard issue drawer (same layout as the E2E run modal: pass/fail
  # headline, filter chips, per-row error expand). Pytest example: pass
  # `--junitxml=test-results.xml` to your test command and mirror the path
  # here. Empty by default — keeps the existing failed-test-name list view.
  # junit_xml_paths:
  #   - "test-results.xml"
  #   - "build/test-results/test/*.xml"

retry:
  max_validation_retries: 3
  validation_error_file: "validation-errors.txt"
  # retry_prompt_template: ".prompts/retry.md"
  interrupted_sessions:
    enabled: true
    retry_coding: true
    retry_review: true
    coding_guard_label: "io:auto-retried-interrupted-coding"
    review_guard_label: "io:auto-retried-interrupted-review"

provider_resilience:
  short_retry:
    max_attempts: 4
    initial_backoff_seconds: 5
    max_backoff_seconds: 60
    jitter: true
  circuit_breaker:
    cooldown_seconds: 1800
    max_cooldowns: 6
    label: "blocked:provider-unavailable"

ui:
  mode: "web"                   # web or cli
  web_port: 8080
  control_api_port: 19080        # 0 = disabled
  queue_refresh_seconds: 600
  fetch_layer:
    enabled: true
    network_sync_seconds: 60      # Network poll cadence (separate from orchestration tick)
    full_scan_interval_seconds: 1800
    discovery_limit: 25
    max_hot_issues_per_cycle: 40
    pr_scan_every_n_refreshes: 2
    dependency_scan_every_n_refreshes: 1
    visibility_aware_enabled: false
    selective_sync_planner_enabled: false
  instances: 1                   # Multi-orchestrator instances
  flow_refresh:
    freshness_mode: balanced       # aggressive | balanced | economy
    api_budget: medium             # low | medium | high
    attention_priority: strict     # strict | normal
    enabled: true
    stale_seconds: 900
    cooldown_seconds: 120
  # Browser session knobs for the Control Center login flow.
  # Env vars override these when set: ISSUE_ORCHESTRATOR_SESSION_TTL_SECONDS,
  # ISSUE_ORCHESTRATOR_SSE_TOKEN_TTL_SECONDS.
  browser_session:
    ttl_seconds: 28800              # 8 hours; min 60
    sse_token_ttl_seconds: 60       # single-use /api/sse-token lifetime
    # max: deprecated and ignored — browser sessions are now stateless
    # cookies validated by HMAC, so there is no in-memory table to cap.
    # The field is still accepted for back-compat with existing YAML.

observability:
  session_no_output_seconds: 120
  session_no_output_tail_lines: 50
  session_no_output_max_bytes: 10000
  session_no_output_repeat_seconds: 120
  session_output_retention_runs: 7
  session_output_retention_days: 7
  session_output_retention_tier: "hot"  # hot | cold
  stale_escalation_ticks: 0
  comment_headings:
    implementation: "## Implementation"
    problems: "## Problems Encountered"
    pr_link: "## Pull Request"
    blocked: "## Blocked"
    needs_human: "## Needs Human Input"

timeline:
  max_records: 5000              # 0 disables trimming

security:
  enforce_hooks: true
  # pre_push_hook: "./custom-hook.sh"
  dangerous:
    allow_unsupported_agents: false

hooks:
  ai_gate:
    interval_days: 7                    # Run AI gate tests every N days (0 = disabled)
    dangerous_allow_failure: false      # If true, warn only; if false, block orchestrator start

ai_systems:
  allowed: []                           # Extra ai_system values beyond ai_systems.yaml

filtering:
  # label: "bot-ready"
  # milestone: "v1.0"
  # milestones: ["M1", "M2"]
  # issue: 123
  # exclude_labels: ["io-e2e-test-data", "test-data"]
  # exclude_label_prefixes: ["io:e2e:"]
  fetch_limit: 100
  max_to_start: 0

milestones:
  sort: "milestone_number"        # milestone_number (default), due_date, pattern, name
  sort_config: {}
  # order: ["M1", "M2"]            # Explicit order; does not filter (unlisted milestones follow sort)
  foundation: "M0"

triage:
  inherit_labels: []
  explicit_labels: []
  milestone_strategy:
    inherit_from_issues: true
    explicit: null
  priority: null

scheduling:
  default_priority_tier: 1

e2e:
  enabled: false
  role: "auto"                     # auto | executor | reader | disabled
  auto_run_interval_minutes: 30
  runner_kind: "pytest"            # pytest | command
  pytest_args:
    - "tests/e2e"
    - "-v"
    - "--tb=short"
    - "--junitxml=.issue-orchestrator/e2e-results/pytest-junit.xml"
  junit_xml_paths:
    - ".issue-orchestrator/e2e-results/pytest-junit.xml"
  # command: ["sh", "scripts/run-e2e-suite.sh"]  # Use instead when runner_kind=command
  # artifact_paths:
  #   - ".issue-orchestrator/e2e-results/**/*.log"
  #   - ".issue-orchestrator/e2e-results/**/*.html"
  #   - ".issue-orchestrator/e2e-results/**/*.summary.txt"
  allow_retry_once: true
  quarantine_file: "tests/e2e/quarantine.txt"
  survive_restart: true
  stop_on_first_failure: false        # If true, stop on first test failure (-x flag)
  auto_quarantine: true               # Auto-add failing tests to quarantine list
  auto_create_issues: true            # Auto-create GitHub issues for failures
  issue_agent_label: "agent:backend"  # Agent label for failure issues
  flake_threshold: 20                  # Flip rate percentage (0-100) to flag test as flaky
  flake_window_runs: 10               # Number of recent runs to check for flip rate
  pr_labels: ["io-e2e-test-data"]

sqlite_backup:
  enabled: true
  cadence_hours: 24
  check_interval_minutes: 60
  retention_daily: 14
  retention_weekly: 8
  enforce_on_startup: true

claims:
  enabled: false
  # claimant_id: "orchestrator-1"
  lease_seconds: 900
  renew_before_expiry_seconds: 300
  convergence_timeout_seconds: 5.0
  convergence_poll_min_ms: 250
  convergence_poll_max_ms: 500

state:
  # file: ".issue-orchestrator/state.json"
