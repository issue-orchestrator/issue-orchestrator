# Example issue-orchestrator configuration
# Copy to your repo as .issue-orchestrator.yaml

# Agent configurations - map issue labels to prompts
agents:
  "agent:backend":
    prompt: ".issue-orchestrator/prompts/backend.md"
    worktree_base: "../"           # Where to create worktrees (relative to repo)
    model: "sonnet"                # Claude model (sonnet, opus, haiku)
    timeout_minutes: 45            # Session timeout
    # command: "claude --model {model} '{initial_prompt}'"  # Custom command
    # repo_root: "/path/to/repo"   # Different repo for this agent

  "agent:frontend":
    prompt: ".issue-orchestrator/prompts/frontend.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 45
    reviewer: "agent:web-reviewer"  # Domain-specific reviewer for frontend PRs

  # Domain expert agent (no code, skip code review)
  "agent:domain-expert":
    prompt: ".issue-orchestrator/prompts/domain-expert.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 30
    skip_review: true  # Skip code review for non-code agents

  # Default reviewer agent for Stage 1 (per-PR code review)
  "agent:reviewer":
    prompt: ".issue-orchestrator/prompts/code-review.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 10

  # Domain-specific reviewer for web/frontend PRs
  "agent:web-reviewer":
    prompt: ".issue-orchestrator/prompts/code-review-web.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 10

  # Triage agent for Stage 2 (batch review)
  "agent:triage":
    prompt: ".issue-orchestrator/prompts/triage-review.md"
    worktree_base: "../"
    model: "sonnet"
    timeout_minutes: 30

# Concurrency settings
concurrency:
  max_concurrent_sessions: 3                  # Max parallel agent sessions
  session_timeout_minutes: 45      # Default timeout for all agents

# Label names (customize if your repo uses different labels)
labels:
  in_progress: "in-progress"       # Applied when work starts
  blocked: "blocked"               # Applied when agent is blocked
  needs_human: "needs-human"       # Applied when agent needs input
  prefix: ""                       # Optional: prefix all labels (e.g., "bot" -> "bot:in-progress")

# Triage advisory labels (create these in your repo):
# - triage-fix: Issues created by CTO agent recommending fixes
# Triage creates issues with "blocked" + "triage-fix" labels.
# Human reviews, then removes "blocked" to approve the fix.

# UI mode: "tmux" (default), "iterm2" (Mac), or "web" (browser dashboard)
ui_mode: "tmux"
web_port: 8080                         # Port for web dashboard (default: 8080)

# Tab/window cleanup behavior
close_completed_tabs: true         # Auto-close tabs for successful completions
close_failed_tabs: false           # Keep failed tabs open for investigation

# Enforcement options
enforce_hooks: true                # Install pre-push hooks to enforce agent-done usage
# pre_push_hook: "./custom-hook.sh"  # Custom pre-push hook (default: bundled validator)

# Worktree setup commands (run after worktree creation)
# Use this to install dependencies so agents don't have to do it manually
setup_worktree:
  # - "npm install"                  # For JavaScript/TypeScript projects
  # - "pip install -e '.[dev]'"      # For Python projects
  # - "bundle install"               # For Ruby projects
  # - "./scripts/setup.sh"           # Custom setup script

# GitHub settings
# repo: "owner/repo-name"          # Explicit repo (otherwise auto-detected from git remote)
# github_token_env: "GITHUB_TOKEN" # Override env var name for token (defaults: GITHUB_TOKEN, GH_TOKEN)
# github_api_url: "https://api.github.com"
# github_http_timeout_seconds: 20
# github_required_scopes: []       # Required OAuth scopes (if set, enforced at startup)
# github_allowed_scopes: []        # Allowed OAuth scopes (if set, token must be subset)
# filter_label: "test-data"        # Only process issues with this label
# filter_milestone: "v1.0"         # Only process issues in this milestone
# session_no_output_seconds: 120   # Emit session_no_output after this many seconds idle
# session_no_output_tail_lines: 50 # Max tail lines to include in session_no_output
# session_no_output_max_bytes: 10000  # Max bytes of tail content
# session_no_output_repeat_seconds: 120  # Minimum gap between session_no_output events
# gh_rate_limit_startup: true      # Log GH rate limits at startup
# gh_rate_limit_every_calls: 500   # Check GH rate limits every N calls (0 = disabled)
# gh_rate_limit_warn_fraction: 0.1 # Warn when remaining below fraction of limit
# gh_rate_limit_warn_remaining: 100 # Warn when remaining below this count
# gh_audit_enabled: false          # Enable GH audit reporting
# gh_audit_events: false           # Emit GH audit events to event stream
# gh_audit_file: null              # Path for GH audit report (supports {pid})
# gh_write_verify_timeout_seconds: 20
# gh_write_verify_initial_delay_ms: 250
# gh_write_verify_max_delay_ms: 2000
# gh_write_verify_backoff: 1.5
# gh_write_verify_jitter_ms: 0

# E2E test harness settings (used by tests/e2e)
e2e:
  cleanup_command_timeout_seconds: 120  # Max wait for gh cleanup commands before timing out

# Custom comment headings (for tooling integration)
comment_headings:
  implementation: "## Implementation"
  problems: "## Problems Encountered"
  pr_link: "## Pull Request"
  blocked: "## Blocked"
  needs_human: "## Needs Human Input"

# Two-stage code review workflow (recommended)
# Stage 1: Per-PR code review (immediate, after each PR)
review:
  enabled: true  # Explicit toggle - if true, default is required
  default: "agent:reviewer"  # Default reviewer for all agents
  code_review_label: "needs-code-review"  # Label applied to PRs needing review
  code_reviewed_label: "code-reviewed"    # Label after review passes

# Per-agent reviewers:
# Each agent can specify a custom reviewer via the `reviewer` field.
# This allows domain-specific reviewers (e.g., agent:web-reviewer for frontend).
# If not specified, the agent uses review.default.

# Rework iteration (when reviewer requests changes)
# max_rework_cycles: 2                  # Max rework attempts before escalating to needs-human (default: 2)

# Stage 2: Triage batch review (triggered when N reviewed PRs accumulate)
# triage_review_agent: "agent:triage"         # Uncomment to enable batch review
# triage_reviewed_label: "triage-reviewed"    # Label after triage review
# triage_review_threshold: 5               # Trigger after N reviewed PRs

# Validation gates - run checks before publishing work
# This ensures agents catch errors BEFORE calling agent-done
validation:
  # Agent gate - runs when agent-done is called
  # If this fails, agent-done rejects and agent must fix issues
  agent_gate:
    cmd: "pyright src/ && pytest tests/unit -x --tb=short"  # Type check + unit tests
    timeout_seconds: 1800  # 30 minutes max

  # Publish gate - runs in pre-push hook (with caching)
  # Caches result by commit SHA to avoid redundant runs
  publish_gate:
    cmd: "pyright src/ && pytest tests/unit -x --tb=short"
    timeout_seconds: 1800

# Validation policy - which gates are enforced
validation_policy:
  # agent_runs: none | agent_gate
  # - none: Skip validation in agent-done (not recommended)
  # - agent_gate: Run agent_gate before writing completion.json
  agent_runs: "agent_gate"

  # publish_requires: none | publish_gate
  # - none: Allow push without validation
  # - publish_gate: Run publish_gate in pre-push (uses cache)
  publish_requires: "publish_gate"
