repo: BruceBGordon/issue-orchestrator
filter_label: test-data
ui_mode: tmux
web_port: 8080
control_api_port: 0
queue_refresh_seconds: 5
e2e_pr_labels:
- test-data
concurrency:
  max_concurrent_sessions: 4
  session_timeout_minutes: 3
agents:
  agent:e2e-test:
    prompt: /Users/brucegordon/dev/issue-orchestrator/examples/scripts/complete-immediately.sh
    worktree_base: /private/var/folders/sc/_51zcvvx0sn4pd7dh55wzl4h0000gn/T/pytest-of-brucegordon/pytest-532/e2e0/worktrees
    model: sonnet
    timeout_minutes: 3
    permission_mode: bypassPermissions
    command: bash {prompt}
    repo_root: /Users/brucegordon/dev/issue-orchestrator
  agent:script-completes:
    prompt: /Users/brucegordon/dev/issue-orchestrator/examples/scripts/complete-immediately.sh
    worktree_base: /private/var/folders/sc/_51zcvvx0sn4pd7dh55wzl4h0000gn/T/pytest-of-brucegordon/pytest-532/e2e0/worktrees
    model: sonnet
    timeout_minutes: 3
    permission_mode: bypassPermissions
    command: bash {prompt}
    repo_root: /Users/brucegordon/dev/issue-orchestrator
  agent:script-review:
    prompt: /Users/brucegordon/dev/issue-orchestrator/examples/scripts/review-decider.sh
    worktree_base: /private/var/folders/sc/_51zcvvx0sn4pd7dh55wzl4h0000gn/T/pytest-of-brucegordon/pytest-532/e2e0/worktrees
    model: sonnet
    timeout_minutes: 3
    permission_mode: bypassPermissions
    command: PR_NUMBER={pr_number} bash {prompt}
    repo_root: /Users/brucegordon/dev/issue-orchestrator
  agent:triage-investigator:
    prompt: /Users/brucegordon/dev/issue-orchestrator/examples/scripts/complete-immediately.sh
    worktree_base: /private/var/folders/sc/_51zcvvx0sn4pd7dh55wzl4h0000gn/T/pytest-of-brucegordon/pytest-532/e2e0/worktrees
    model: sonnet
    timeout_minutes: 3
    permission_mode: bypassPermissions
    command: bash {prompt}
    repo_root: /Users/brucegordon/dev/issue-orchestrator
validation:
  agent_gate:
    cmd: make typecheck
    timeout_seconds: 120
  publish_gate:
    cmd: make typecheck
    timeout_seconds: 120
validation_policy:
  publish_requires: null
  agent_runs: null
review:
  code_review_agent: agent:script-review
  code_review_label: needs-code-review
  code_reviewed_label: code-reviewed
  max_rework_cycles: 2
  triage_review_agent: agent:triage-investigator
  triage_review_label: null
  triage_reviewed_label: null
  triage_review_threshold: 2
  triage_review_on_failure: true
cleanup:
  with_triage:
    close_ai_session_tabs: true
    remove_worktrees: false
  without_triage:
    wait_for_code_review: true
    close_ai_session_tabs: true
    remove_worktrees: false
dangerous:
  skip_verification: true
  allow_unsupported_agents: false
