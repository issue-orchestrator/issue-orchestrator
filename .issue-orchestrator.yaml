repo: BruceBGordon/issue-orchestrator

filter_label: test-data  # Only process test issues

agents:
  "agent:backend":
    prompt: "examples/prompts/simple-fix.md"
    model: haiku
  "agent:frontend":
    prompt: "examples/prompts/simple-fix.md"
    model: haiku
  "agent:mobile":
    prompt: "examples/prompts/simple-fix.md"
    model: haiku
  "agent:e2e-test":
    prompt: "tests/e2e/fixtures/prompts/e2e-test.md"
    model: haiku
    timeout_minutes: 5  # Agent work (~1 min) + typecheck validation (~2 min)
    worktree_base: /tmp/e2e-worktrees
    permission_mode: bypassPermissions

  "agent:e2e-test-timeout":
    prompt: "tests/e2e/fixtures/prompts/e2e-test-timeout.md"
    model: haiku
    timeout_minutes: 1  # Very short - designed to timeout
    worktree_base: /tmp/e2e-worktrees

  "agent:e2e-test-rejects":
    prompt: "tests/e2e/fixtures/prompts/e2e-test-rejects.md"
    model: haiku
    timeout_minutes: 5
    skip_review: true  # This IS a code reviewer, don't review it
    worktree_base: /tmp/e2e-worktrees
    permission_mode: bypassPermissions

  "agent:e2e-test-approves":
    prompt: "tests/e2e/fixtures/prompts/e2e-test-approves.md"
    model: haiku
    timeout_minutes: 5
    skip_review: true  # This IS a code reviewer, don't review it
    worktree_base: /tmp/e2e-worktrees
    permission_mode: bypassPermissions

concurrency:
  max_concurrent_sessions: 6
  session_timeout_minutes: 10

# Code review configuration
review:
  code_review_agent: "agent:e2e-test-approves"  # Default: approves for happy path
  code_review_label: "needs-code-review"
  code_reviewed_label: "code-reviewed"
  max_rework_cycles: 2  # Low for faster testing

# Validation gate - blocks push if validation fails
validation:
  publish_gate:
    cmd: "make validate"
    timeout_seconds: 300  # 5 minutes for typecheck + lint + unit tests

validation_policy:
  publish_requires: publish_gate  # Enforce validation on push

github_token_env: GITHUB_TOKEN
