repo: BruceBGordon/issue-orchestrator
filter_label: test-data
agents:
  agent:backend:
    prompt: examples/prompts/simple-fix.md
    model: haiku
  agent:frontend:
    prompt: examples/prompts/simple-fix.md
    model: haiku
  agent:mobile:
    prompt: examples/prompts/simple-fix.md
    model: haiku
  agent:e2e-test:
    prompt: tests/e2e/fixtures/prompts/e2e-test.md
    model: haiku
    timeout_minutes: 5
    worktree_base: /tmp/e2e-worktrees
    permission_mode: bypassPermissions
  agent:e2e-test-timeout:
    prompt: tests/e2e/fixtures/prompts/e2e-test-timeout.md
    model: haiku
    timeout_minutes: 1
    worktree_base: /tmp/e2e-worktrees
  agent:e2e-test-rejects:
    prompt: tests/e2e/fixtures/prompts/e2e-test-rejects.md
    model: haiku
    timeout_minutes: 5
    skip_review: true
    worktree_base: /tmp/e2e-worktrees
    permission_mode: bypassPermissions
  agent:e2e-test-approves:
    prompt: tests/e2e/fixtures/prompts/e2e-test-approves.md
    model: haiku
    timeout_minutes: 5
    skip_review: true
    worktree_base: /tmp/e2e-worktrees
    permission_mode: bypassPermissions
  agent:reviewer:
    prompt: .issue-orchestrator/prompts/reviewer.md
    model: sonnet
    timeout_minutes: 30
    worktree_base: ../
concurrency:
  max_concurrent_sessions: 6
  session_timeout_minutes: 10
review:
  code_review_agent: agent:e2e-test-approves
  code_review_label: needs-code-review
  code_reviewed_label: code-reviewed
  max_rework_cycles: 2
  enabled: true
  default: agent:reviewer
validation:
  publish_gate:
    cmd: make validate
    timeout_seconds: 300
validation_policy:
  publish_requires: publish_gate
github_token_env: GITHUB_TOKEN
milestone_sort: milestone_number
