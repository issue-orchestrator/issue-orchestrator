repo: BruceBGordon/issue-orchestrator

filter_label: test-data  # Only process test issues

agents:
  "agent:backend":
    prompt: "examples/prompts/simple-fix.md"
    model: haiku
  "agent:frontend":
    prompt: "examples/prompts/simple-fix.md"
    model: haiku
  "agent:mobile":
    prompt: "examples/prompts/simple-fix.md"
    model: haiku
  "agent:e2e-test":
    prompt: "examples/prompts/e2e-test.md"
    model: haiku
    timeout_minutes: 1  # Very short - agent completes in ~30s, timeout recovers if no /exit
    worktree_base: /tmp/e2e-worktrees
    permission_mode: bypassPermissions

  "agent:e2e-test-timeout":
    prompt: "examples/prompts/e2e-test-timeout.md"
    model: haiku
    timeout_minutes: 1  # Very short - designed to timeout
    worktree_base: /tmp/e2e-worktrees

  "agent:e2e-test-rejects":
    prompt: "examples/prompts/e2e-test-rejects.md"
    model: haiku
    timeout_minutes: 5
    skip_review: true  # This IS a code reviewer, don't review it
    worktree_base: /tmp/e2e-worktrees

concurrency:
  max_concurrent_sessions: 2
  session_timeout_minutes: 10

# For e2e testing of rework cycles - uncomment to test rejection flow
# review:
#   code_review_agent: "agent:e2e-test-rejects"
#   code_review_label: "needs-code-review"
#   code_reviewed_label: "code-reviewed"
#   max_rework_cycles: 2  # Low for faster testing
