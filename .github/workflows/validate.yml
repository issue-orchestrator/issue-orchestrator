name: validate

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Classify changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - src/**
              - tests/**
              - tools/**
              - Makefile
              - requirements*.txt
              - pyproject.toml
              - pyrightconfig*.json
              - tools/ast_guardrails.yml
              - .github/workflows/**

  validate:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Cache tool state
        uses: actions/cache@v4
        with:
          path: |
            .pytest_cache
            .pyright
            ~/.cache/pip
            ~/.cache/pre-commit
          key: tooling-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'pyrightconfig*.json', 'tools/ast_guardrails.yml', 'Makefile') }}

      - name: Run validate
        run: make validate PYRIGHT=pyright PYTEST=pytest LINT_IMPORTS=lint-imports RUFF=ruff PYTHON=python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}