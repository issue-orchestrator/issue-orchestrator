name: validate

on:
  pull_request:
  merge_group:
  push:
    branches: [ main ]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Classify changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            python:
              - src/**
              - tests/**
              - tools/**
              - scripts/**
              - Makefile
              - requirements*.txt
              - pyproject.toml
              - uv.lock
              - pyrightconfig*.json
              - tools/ast_guardrails.yml
              - .github/workflows/**
              - '**/AGENTS.md'
              - '**/CLAUDE.md'
            node:
              - packages/vscode/**
              - .github/workflows/**

  validate-fast:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras
          make semgrep-venv

      - name: Install Playwright browsers
        run: .venv/bin/playwright install chromium

      - name: Run fast validate
        run: make validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-agent:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: |
          uv sync --frozen --all-extras
          make semgrep-venv

      - name: Run agent-backed validate
        run: |
          make test-simulated-agent
          make test-integration-agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Type-checks the VS Code extension. `make test-vscode` self-skips on GitHub
  # Actions because its harness downloads VS Code and needs a display, which
  # left packages/vscode with no CI coverage at all -- npm dependency PRs went
  # green without anything having compiled them. `tsc` needs no display and
  # catches the type-level breakage (typescript, @types/*) that makes up most of
  # that risk. Runtime extension behavior is still only covered by local
  # `make validate` / `make deps-batch`.
  validate-vscode:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: packages/vscode

      - name: Type-check extension
        run: npm run compile
        working-directory: packages/vscode
