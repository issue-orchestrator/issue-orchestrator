version: 2

# Grouping/auto-merge policy is keyed on CI coverage, not on semver.
#
# semver-major is upstream's statement about *their* API compatibility; it says
# nothing about our exposure, which is governed by whether CI exercises the
# dependency. So majors are grouped and auto-merged wherever CI is load-bearing
# (uv, github-actions -- see .github/workflows/dependabot-auto-merge.yml), and
# npm is held back entirely because `test-vscode` cannot run the extension
# harness in CI. The npm bucket is verified by `make deps-batch` locally, where
# the full VS Code test harness actually runs.
#
# Majors live in their own group per ecosystem purely for failure isolation:
# a group is one PR, so folding majors into the minor/patch PR lets a single
# bad major hold every safe update hostage.

updates:
  # /tools/semgrep is a separate uv project with its own lockfile. It was absent
  # from this config, so Dependabot security updates for it arrived ungrouped,
  # one PR per advisory. (/packages/agent_runner is deliberately omitted: it
  # declares no runtime dependencies and is consumed via pythonpath, not
  # installed, so there is nothing there to update.)
  - package-ecosystem: "uv"
    directories:
      - "/"
      - "/tools/semgrep"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      python-major:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "major"
      python-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-major:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "major"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/packages/vscode"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Denver"
    open-pull-requests-limit: 5
    groups:
      vscode-npm-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      vscode-npm-major:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "major"
      vscode-npm-security:
        applies-to: "security-updates"
        patterns:
          - "*"
